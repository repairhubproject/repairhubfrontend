            <div class="lg:w-[54px] lg:h-[54px] w-[44px] h-[44px] bg-slate-300 rounded-full">
              <img src="../../src/assets/profile.png" alt="" class="h-full w-full object-fill">
            </div>
            <span class="text-base text-black">John Bull</span>
          </div>
        </div>
      </div>

    <div class="md:flex w-full md:h-screen overflow-hidden">
      <aside class="w-2xs border-r h-full shadow-[4px_0_12px_rgba(0,0,0,0.15)] pt-40 max-md:hidden overflow-y-auto hide-scrollbar">
        <nav aria-label="Main navigation" class="px-5 mb-10">
          <ul class="w-[190px] flex flex-col gap-3">
            <li class="w-full bg-[rgba(193,211,249,1)] cursor-pointer px-3 py-2 rounded-lg">
              <a href="/pages/customer/dashboard.html" class="actext-base text-[rgba(37,99,235,1)] flex items-center gap-2">
                <i class="ph-fill ph-house text-xl"></i>
                <span class="">Home</span>
              </a>
            </li>
            <li class="w-full cursor-pointer px-3 py-2 rounded-lg">
              <a href="/pages/customer/dashboard.html" class="text-base  text-black hover:text-[rgba(37,99,235,1)] transition-all duration-300 ease flex items-center gap-2">
                <i class="ph-fill ph-grid-four text-xl"></i>
                <span class=" ">Categories</span>
              </a>
            </li>
            <li class="w-full cursor-pointer px-3 py-2 rounded-lg">
              <a href="/pages/customer/booking.html" class="text-base  text-black hover:text-[rgba(37,99,235,1)] transition-all duration-300 ease flex items-center gap-2">

                <span class=" ">Bookings</span>

            <li class="w-full cursor-pointer px-3 py-2 rounded-lg">

            </li>

                <i class="ph-fill ph-bell-simple text-xl"></i>
                <span class=" ">Notification</span>
              </a>
            </li>
            <li class="w-full cursor-pointer px-3 py-2 rounded-lg">
              <a href="/pages/customer/saved" class="text-base  text-black hover:text-[rgba(37,99,235,1)] transition-all duration-300 ease flex items-center gap-2">

        <div class="px-1 flex flex-col gap-1 py-1">

              <button class="bg-[#2563EB33/20] text-center rounded-lg py-4 font-semibold text-[#2563EB] text-sm hover:text-white hover:bg-[#2563EB] transition-all duration-300 ease border border-[#2563EB] cursor-pointer box-border">Request Repair</button>
              <button class="bg-white text-center rounded-lg py-4 font-semibold text-[#8E8E96] text-sm hover:text-white hover:bg-[#2563EB] transition-all duration-300 ease border border-[#2563EB] cursor-pointer">Find Technician</button>
            </div>
          </div>
          <div class="bg-[rgba(193,211,249,1)] rounded-lg pt-3 px-3 pb-10">

              <h1 class="text-[#8E8E96] text-base">Need Help?</h1>

            </div>

            </div>
          </div>

      <main class="flex-1 min-h-screen">

  <!-- EDIT PROFILE TITLE -->
  <div class="flex justify-end px-10 py-8">
    <a href="/pages/customer/profile.html" class="flex items-center gap-2 text-slate-600 hover:text-blue-600" aria-label="Back to profile">
      <i class="ph ph-caret-left text-2xl"></i>
      <span>Back to Profile</span>
    </a>
    <h1 class="text-2xl font-bold text-slate-900">Edit Profile</h1>
  </div>


  <!-- PROFILE + FORM -->
  <section class="flex items-start justify-center gap-14 mt-10 px-10">

    <!-- PROFILE CARD -->
    <div class="relative w-[220px] h-[230px]">

      <div
        class="absolute inset-0 bg-cover bg-center rounded-lg"
        style="background-image: url('../../src/assets/Profile banner.jpg');">
      </div>

      <div class="absolute top-5 left-1/2 -translate-x-1/2">
        <img
          src="../../src/assets/Profile-pic.png"
          alt="Profile picture"
          class="w-[140px] h-[140px] object-cover rounded-full border-4 border-white"
        >

        <button
          class="absolute bottom-0 right-2 w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center">
          <i class="ph ph-camera"></i>
        </button>
      </div>

      <div
        class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-white rounded-lg shadow-md px-4 py-2 w-[190px] text-center">

        <h2 class="font-bold text-lg">
          Samuel Adeyemi
        </h2>

        <p class="text-[8px] tracking-widest">
          samueladeyemi@gmail.com
        </p>

      </div>

    </div>


    <!-- FORM -->
    <div class="w-[480px] flex flex-col gap-9">

      <!-- Full Name -->
      <div class="h-[60px] border border-gray-200 rounded-lg shadow-md px-5 flex items-center gap-4">

        <i class="ph ph-user text-2xl"></i>

        <div class="flex-1">
          <label class="block font-bold">
            Full Name
          </label>

          <input
            type="text"
            value="Samuel Adeyemi"
            class="w-full outline-none text-sm"
          >
        </div>

        <button>
          <i class="ph ph-pencil-simple text-xl"></i>
        </button>

      </div>


      <!-- Contact Number -->
      <div class="h-[60px] border border-gray-200 rounded-lg shadow-md px-5 flex items-center gap-4">

        <i class="ph ph-phone text-2xl"></i>

        <div class="flex-1">
          <label class="block font-bold">
            Contact Number
          </label>

          <input
            type="tel"
            value="09071234567"
            class="w-full outline-none text-sm"
          >
        </div>

        <button>
          <i class="ph ph-pencil-simple text-xl"></i>
        </button>

      </div>


      <!-- Email -->
      <div class="h-[60px] border border-gray-200 rounded-lg shadow-md px-5 flex items-center gap-4">

        <i class="ph ph-envelope text-2xl"></i>

        <div class="flex-1">
          <label class="block font-bold">
            Email Address
          </label>

          <input
            type="email"
            value="samueladeyemi@gmail.com"
            class="w-full outline-none text-sm"
          >
        </div>

        <button>
          <i class="ph ph-pencil-simple text-xl"></i>
        </button>

      </div>


      <!-- Change Password -->
      <button class="w-[150px] h-[30px] bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-full mx-auto">
        Change Password
      </button>

    </div>

  </section>


  <!-- DELETE ACCOUNT -->
  <div class="flex justify-center mt-8">
    <button class="text-red-500 text-2xl">
      Delete Account
    </button>
  </div>
